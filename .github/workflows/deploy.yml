name: Deploy to Server

on:
  push:
    branches: [main]
    paths:
      - ".github/**"
      - "**.py"
      - "**.js"
      - "**.jsx"
      - "**.html"
      - "**.css"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"
      - "bt-nginx.conf"
      - "frontend/**"
      - "run.sh"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 10m
          script: |
            set -e
            echo "=== 0. 检查/初始化 /opt/ai-kb ==="
            if [ ! -d /opt/ai-kb/.git ]; then
              echo "首次部署，执行 setup..."
              mkdir -p /opt/ai-kb
              cd /opt/ai-kb
              git clone https://github.com/bitpzz/ai-kb.git .
              test -f .env || cat > .env << 'DOTENV'
SILICONFLOW_API_KEY=${{ secrets.SILICONFLOW_API_KEY }}
SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
DEBUG=False
ALLOWED_HOSTS=82.156.164.62,localhost,127.0.0.1
DOTENV
            fi
            cd /opt/ai-kb
            echo "=== 1. 拉取代码 ==="
            git pull origin main
            echo "=== 2. 构建镜像 ==="
            docker compose build
            echo "=== 3. 重启容器 ==="
            docker compose up -d --force-recreate
            docker image prune -f
            echo "=== 4. 运行状态 ==="
            docker compose ps
