name: Deploy to Server

on:
  push:
    branches: [main]
    paths:
      - ".github/**"
      - "**.py"
      - "**.js"
      - "**.jsx"
      - "**.html"
      - "**.css"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"
      - "bt-nginx.conf"
      - "frontend/**"
      - "run.sh"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 20m
          script: |
            set -e

            echo "=== 0. 检查/初始化 /opt/ai-kb ==="
            if [ ! -d /opt/ai-kb/.git ]; then
              rm -rf /opt/ai-kb
              git clone https://github.com/bitpzz/ai-kb.git /opt/ai-kb
            fi
            cd /opt/ai-kb

            echo "=== 1. 创建 .env ==="
            test -f .env || printf 'SILICONFLOW_API_KEY=%s\nSECRET_KEY=%s\nDEBUG=False\nALLOWED_HOSTS=82.156.164.62,localhost,127.0.0.1\n' \
              "${{ secrets.SILICONFLOW_API_KEY }}" "${{ secrets.DJANGO_SECRET_KEY }}" > .env

            echo "=== 2. 拉取代码 ==="
            git pull origin main

            echo "=== 3. 构建镜像 ==="
            # 首次慢（需下载基础镜像），后续只用增量层
            export DOCKER_BUILDKIT=1
            docker compose build --build-arg BUILDKIT_INLINE_CACHE=1

            echo "=== 4. 重启容器 ==="
            docker compose up -d --force-recreate
            docker image prune -f

            echo "=== 5. 运行状态 ==="
            docker compose ps
