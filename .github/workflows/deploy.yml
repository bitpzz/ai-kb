name: Deploy to Server

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 后端镜像 ──
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 前端镜像 ──
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 部署到服务器 ──
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/ai-kb
            # 停掉宝塔 Nginx 释放 80 端口（由 Docker 前端接管）
            systemctl stop nginx 2>/dev/null || service nginx stop 2>/dev/null || true
            systemctl disable nginx 2>/dev/null || true
            # 如果 80 端口还被占，杀掉占用进程
            fuser -k 80/tcp 2>/dev/null || true
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # 如果 .env 不存在则创建
            test -f .env || cat > .env << 'EOF'
SILICONFLOW_API_KEY=${{ secrets.SILICONFLOW_API_KEY }}
SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
ALLOWED_HOSTS=${{ secrets.SERVER_HOST }}
EOF
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
